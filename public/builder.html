<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice-to-Static-Site Builder</title>
  <style>
    :root {
      --bg-a: #042f2e;
      --bg-b: #1f2937;
      --bg-c: #0f172a;
      --text-main: #f8fafc;
      --text-muted: #cbd5e1;
      --line: rgba(148, 163, 184, 0.3);
      --glass: rgba(15, 23, 42, 0.35);
      --glass-strong: rgba(15, 23, 42, 0.58);
      --accent: #22d3ee;
      --accent-2: #f59e0b;
      --danger: #f87171;
      --ok: #34d399;
      --orb-level: 0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", "SF Pro Text", "Segoe UI", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(56, 189, 248, 0.18), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, rgba(245, 158, 11, 0.16), transparent 60%),
        linear-gradient(160deg, var(--bg-a), var(--bg-b) 45%, var(--bg-c));
      overflow-x: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.08;
      pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.9) 0.5px, transparent 0.5px);
      background-size: 3px 3px;
      mix-blend-mode: soft-light;
    }

    .app {
      max-width: 1120px;
      margin: 0 auto;
      padding: 2.2rem 1.2rem 3rem;
      position: relative;
      z-index: 1;
    }

    .hero {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }

    .title {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 3rem);
      letter-spacing: -0.03em;
      line-height: 1.05;
      max-width: 14ch;
      text-wrap: balance;
    }

    .subtitle {
      margin: 0.65rem 0 0;
      color: var(--text-muted);
      max-width: 62ch;
      font-size: 0.95rem;
    }

    .model-tag {
      border: 1px solid rgba(255,255,255,0.32);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
      padding: 0.48rem 0.8rem;
      border-radius: 999px;
      font-size: 0.8rem;
      color: #ecfeff;
      letter-spacing: 0.04em;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 1rem;
    }

    .glass {
      border: 1px solid var(--line);
      background: linear-gradient(160deg, rgba(255,255,255,0.14), var(--glass));
      box-shadow:
        0 18px 45px rgba(2, 6, 23, 0.32),
        inset 0 1px 0 rgba(255,255,255,0.2);
      border-radius: 26px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .panel { padding: 1rem; }

    .orb-wrap {
      min-height: 340px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }

    .aurora {
      position: absolute;
      width: 480px;
      height: 480px;
      background: conic-gradient(from 140deg, rgba(34, 211, 238, 0.32), rgba(245, 158, 11, 0.24), rgba(52, 211, 153, 0.22), rgba(34, 211, 238, 0.3));
      border-radius: 50%;
      filter: blur(54px);
      transform: translateY(30px) scale(0.9);
      animation: spin 14s linear infinite;
      pointer-events: none;
    }

    .listening-stack {
      position: relative;
      width: 210px;
      height: 210px;
      display: grid;
      place-items: center;
    }

    .orb {
      width: 126px;
      height: 126px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #cffafe, #06b6d4 50%, #0c4a6e 88%);
      box-shadow: 0 0 0 12px rgba(34, 211, 238, 0.14), 0 0 55px rgba(6, 182, 212, 0.5);
      transition: transform 90ms linear, box-shadow 140ms ease;
      transform: scale(calc(1 + var(--orb-level) * 0.7));
    }

    .ring {
      position: absolute;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      transform: scale(calc(0.98 + var(--orb-level) * 0.4));
      opacity: calc(0.5 + var(--orb-level) * 0.5);
      animation: pulse 2.8s ease-in-out infinite;
    }

    .ring.r1 { width: 162px; height: 162px; }
    .ring.r2 { width: 192px; height: 192px; animation-delay: 0.45s; }
    .ring.r3 { width: 220px; height: 220px; animation-delay: 0.9s; }

    .state {
      font-size: 0.86rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #e2e8f0;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.08);
    }

    .meter {
      width: min(380px, 85%);
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(148, 163, 184, 0.25);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .meter > span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #06b6d4, #22d3ee 45%, #f59e0b);
      transition: width 90ms linear;
    }

    .controls {
      display: grid;
      gap: 0.65rem;
      margin-top: 0.8rem;
    }

    .row { display: flex; gap: 0.6rem; flex-wrap: wrap; }

    button {
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.12);
      color: var(--text-main);
      padding: 0.64rem 0.95rem;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 120ms ease, background 180ms ease, opacity 180ms ease;
      font-weight: 640;
      letter-spacing: 0.02em;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.2);
    }

    button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .btn-start { border-color: rgba(52, 211, 153, 0.55); background: rgba(16, 185, 129, 0.18); }
    .btn-stop { border-color: rgba(251, 191, 36, 0.5); background: rgba(245, 158, 11, 0.18); }
    .btn-primary { border-color: rgba(34, 211, 238, 0.58); background: rgba(34, 211, 238, 0.2); }
    .btn-danger { border-color: rgba(248, 113, 113, 0.62); background: rgba(248, 113, 113, 0.16); }

    .field {
      display: grid;
      gap: 0.35rem;
    }

    label {
      font-size: 0.79rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.2);
      background: var(--glass-strong);
      color: var(--text-main);
      padding: 0.65rem 0.72rem;
      border-radius: 12px;
      font-size: 0.92rem;
      outline: none;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus, textarea:focus, select:focus {
      border-color: rgba(34, 211, 238, 0.62);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.16);
    }

    .status-line {
      margin: 0;
      color: #e2e8f0;
      min-height: 1.2rem;
      font-size: 0.88rem;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 0.8rem;
      color: var(--text-muted);
      font-size: 0.78rem;
      margin-top: 0.35rem;
    }

    .error { color: #fecaca; }
    .ok { color: #bbf7d0; }

    @keyframes pulse {
      0%, 100% { transform: scale(calc(0.96 + var(--orb-level) * 0.35)); }
      50% { transform: scale(calc(1.02 + var(--orb-level) * 0.55)); }
    }

    @keyframes spin {
      from { transform: translateY(30px) rotate(0deg) scale(0.9); }
      to { transform: translateY(30px) rotate(360deg) scale(0.9); }
    }

    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .orb-wrap { min-height: 300px; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <main class="app">
    <section class="hero">
      <div>
        <h1 class="title">Voice-to-Static-Site Builder</h1>
        <p class="subtitle">Capture voice briefs, transcribe with Whisper-1, then hand the transcript to your generation pipeline. Includes an interruptible audio/transcription lifecycle.</p>
      </div>
      <div class="model-tag" id="agent-model">Agent Runtime: GPT-5.3</div>
    </section>

    <section class="layout">
      <article class="glass panel">
        <div class="orb-wrap">
          <div class="aurora"></div>
          <div class="listening-stack" aria-hidden="true">
            <div class="ring r1"></div>
            <div class="ring r2"></div>
            <div class="ring r3"></div>
            <div class="orb" id="orb"></div>
          </div>
          <div class="state" id="state-pill">Idle</div>
          <div class="meter"><span id="meter-fill"></span></div>
        </div>

        <div class="controls">
          <div class="row">
            <button id="btn-start" class="btn-start">Start Listening</button>
            <button id="btn-stop" class="btn-stop" disabled>Stop</button>
            <button id="btn-transcribe" class="btn-primary" disabled>Transcribe</button>
            <button id="btn-interrupt" class="btn-danger" disabled>Interrupt</button>
          </div>
          <div class="row">
            <button id="btn-download" disabled>Download WAV</button>
            <button id="btn-reset">Reset</button>
          </div>
          <p class="status-line" id="status-line">Ready.</p>
          <div class="meta">
            <span id="duration">Duration: 0.0s</span>
            <span id="blob-size">WAV: -</span>
          </div>
        </div>
      </article>

      <article class="glass panel">
        <div class="field">
          <label for="backend">Transcription Backend</label>
          <select id="backend">
            <option value="local" selected>Local Whisper Server (no API key)</option>
            <option value="openai">OpenAI Whisper-1 (cloud)</option>
          </select>
        </div>
        <div class="field" id="api-key-field">
          <label for="api-key">OpenAI API Key</label>
          <input id="api-key" type="password" placeholder="sk-..." autocomplete="off" />
        </div>
        <div class="field" id="local-endpoint-field" style="display:none; margin-top: 0.8rem;">
          <label for="local-endpoint">Local STT Endpoint</label>
          <input id="local-endpoint" type="text" value="http://127.0.0.1:8001/v1/audio/transcriptions" />
        </div>
        <div class="field" id="local-model-field" style="display:none; margin-top: 0.8rem;">
          <label for="local-model">Local Whisper Model</label>
          <input id="local-model" type="text" value="small" />
        </div>
        <div class="field" style="margin-top: 0.8rem;">
          <label for="language">Language Hint (Optional)</label>
          <input id="language" type="text" placeholder="en" value="en" />
        </div>
        <div class="field" style="margin-top: 0.8rem;">
          <label for="prompt">Whisper Prompt (Optional)</label>
          <input id="prompt" type="text" placeholder="Domain hints, names, terms..." />
        </div>
        <div class="field" style="margin-top: 0.8rem;">
          <label for="transcript">Transcript</label>
          <textarea id="transcript" placeholder="Transcript appears here after Whisper-1 returns..."></textarea>
        </div>
      </article>
    </section>
  </main>

  <script>
    const AGENT_MODEL = "GPT-5.3";

    class VoiceAgent {
      constructor({ onStateChange, onLevel, onStatus, onMetrics } = {}) {
        this.onStateChange = onStateChange || (() => {});
        this.onLevel = onLevel || (() => {});
        this.onStatus = onStatus || (() => {});
        this.onMetricsHandler = onMetrics || (() => {});

        this.state = "idle";
        this.stream = null;
        this.recorder = null;
        this.audioCtx = null;
        this.analyser = null;
        this.analyserData = null;
        this.levelRaf = null;
        this.recordedChunks = [];
        this.recordingStartedAt = 0;
        this.durationRaf = null;
        this._lastMetrics = { durationSeconds: 0, wavBytes: 0 };

        this.lastWavBlob = null;
        this.lastSourceBlob = null;
        this.abortController = null;
      }

      setState(next) {
        this.state = next;
        this.onStateChange(next);
      }

      async start() {
        if (this.state === "listening" || this.state === "transcribing") return;

        try {
          this.recordedChunks = [];
          this.lastWavBlob = null;

          const constraints = {
            audio: {
              noiseSuppression: true,
              echoCancellation: true,
              autoGainControl: false,
              channelCount: 1,
              sampleRate: 48000
            }
          };

          this.stream = await navigator.mediaDevices.getUserMedia(constraints);

          const mimeType = VoiceAgent.chooseRecorderMimeType();
          const recorderOptions = { audioBitsPerSecond: 256000 };
          if (mimeType) recorderOptions.mimeType = mimeType;

          this.recorder = new MediaRecorder(this.stream, recorderOptions);

          this.recorder.addEventListener("dataavailable", (event) => {
            if (event.data && event.data.size > 0) {
              this.recordedChunks.push(event.data);
            }
          });

          this.recorder.start(240);
          this.recordingStartedAt = performance.now();
          this.setupAnalyser(this.stream);
          this.runDurationLoop();
          this.setState("listening");
          this.onStatus("Recording in progress.");
        } catch (error) {
          this.setState("error");
          this.onStatus("Microphone access failed: " + error.message, true);
          throw error;
        }
      }

      async stop() {
        if (this.state !== "listening" || !this.recorder) {
          return this.lastWavBlob;
        }

        this.setState("stopping");
        this.onStatus("Stopping recorder and finalizing WAV...");

        const wavBlob = await new Promise((resolve, reject) => {
          const recorder = this.recorder;

          recorder.addEventListener("stop", async () => {
            try {
              const finalDuration = (performance.now() - this.recordingStartedAt) / 1000;
              this.stopAllTracks();
              this.stopAnalyserLoop();
              this.stopDurationLoop();
              this.lastSourceBlob = this.getSourceBlob();
              const blob = await this.convertRecordedAudioToWav(this.lastSourceBlob);
              this.lastWavBlob = blob;
              this.setState("recorded");
              this.onStatus("WAV ready for transcription.", false, "ok");
              this.emitMetrics({ durationSeconds: finalDuration, wavBytes: blob.size });
              resolve(blob);
            } catch (error) {
              this.setState("error");
              this.onStatus("WAV export failed: " + error.message, true);
              reject(error);
            }
          }, { once: true });

          recorder.stop();
        });

        this.recorder = null;
        return wavBlob;
      }

      async transcribe({
        apiKey,
        language,
        prompt,
        temperature = 0,
        useCompressedUpload = true,
        backend = "openai",
        localEndpoint = "http://127.0.0.1:8001/v1/audio/transcriptions",
        localModel = "small"
      } = {}) {
        if (!this.lastWavBlob) {
          throw new Error("No WAV audio available. Record and stop first.");
        }
        if (this.state === "transcribing") {
          throw new Error("Transcription already in progress.");
        }
        this.abortController = new AbortController();
        this.setState("transcribing");
        const uploadBlob = (useCompressedUpload && this.lastSourceBlob) ? this.lastSourceBlob : this.lastWavBlob;
        const filename = this.getUploadFilename(uploadBlob.type);
        if (backend === "local") {
          this.onStatus("Uploading " + filename + " (" + this.formatBlobSize(uploadBlob.size) + ") to local STT endpoint...");
          const formData = new FormData();
          formData.append("model", localModel || "whisper");
          formData.append("file", new File([uploadBlob], filename, { type: uploadBlob.type || "application/octet-stream" }));
          if (language) formData.append("language", language);
          if (prompt) formData.append("prompt", prompt);
          try {
            const response = await fetch(localEndpoint, {
              method: "POST",
              body: formData,
              signal: this.abortController.signal
            });
            if (!response.ok) {
              const details = await response.text();
              throw new Error("Local STT error " + response.status + ": " + details);
            }
            const result = await response.json();
            const text = (result && result.text)
              ? result.text.trim()
              : (result && result.transcription)
                ? result.transcription.trim()
                : "";
            if (!text) {
              throw new Error("Local STT returned no transcript text.");
            }
            this.setState("done");
            this.onStatus("Transcription completed.", false, "ok");
            return text;
          } catch (error) {
            if (error.name === "AbortError") {
              this.setState("interrupted");
              this.onStatus("Transcription interrupted by user.", false, "ok");
              return "";
            }
            this.setState("error");
            this.onStatus("Transcription failed: " + error.message + " Verify your local Whisper server is running and endpoint is correct.", true);
            throw error;
          } finally {
            this.abortController = null;
          }
        } else {
          if (!apiKey) {
            throw new Error("OpenAI API key is required.");
          }
          this.onStatus("Uploading " + filename + " (" + this.formatBlobSize(uploadBlob.size) + ") to Whisper-1...");
          const formData = new FormData();
          const uploadFile = new File([uploadBlob], filename, { type: uploadBlob.type || "application/octet-stream" });
          formData.append("file", uploadFile);
          formData.append("model", "whisper-1");
          formData.append("response_format", "json");
          if (language) formData.append("language", language);
          if (prompt) formData.append("prompt", prompt);
          formData.append("temperature", String(temperature));
          try {
            const response = await fetch("https://api.openai.com/v1/audio/transcriptions", {
              method: "POST",
              headers: {
                Authorization: "Bearer " + apiKey
              },
              body: formData,
              signal: this.abortController.signal
            });
            if (!response.ok) {
              const details = await response.text();
              throw new Error("Whisper-1 error " + response.status + ": " + details);
            }
            const result = await response.json();
            const text = (result && result.text) ? result.text.trim() : "";
            this.setState("done");
            this.onStatus("Transcription completed.", false, "ok");
            return text;
          } catch (error) {
            if (error.name === "AbortError") {
              this.setState("interrupted");
              this.onStatus("Transcription interrupted by user.", false, "ok");
              return "";
            }
            this.setState("error");
            this.onStatus("Transcription failed: " + error.message, true);
            throw error;
          } finally {
            this.abortController = null;
          }
        }
      }

      interrupt() {
        if (this.state === "transcribing" && this.abortController) {
          this.abortController.abort();
          return true;
        }
        return false;
      }

      reset() {
        this.stopAllTracks();
        this.stopAnalyserLoop();
        this.stopDurationLoop();
        this.recordedChunks = [];
        this.lastWavBlob = null;
        this.lastSourceBlob = null;
        this.recorder = null;
        this.abortController = null;
        this.onLevel(0);
        this.emitMetrics({ durationSeconds: 0, wavBytes: 0 });
        this.setState("idle");
        this.onStatus("Reset complete.");
      }

      getDurationSeconds() {
        if (this.state === "listening") {
          return (performance.now() - this.recordingStartedAt) / 1000;
        }

        const metrics = this._lastMetrics || { durationSeconds: 0 };
        return metrics.durationSeconds || 0;
      }

      getSourceBlob() {
        if (!this.recordedChunks.length) {
          throw new Error("No audio frames captured.");
        }
        return new Blob(this.recordedChunks, { type: this.recorder ? this.recorder.mimeType : "audio/webm" });
      }

      async convertRecordedAudioToWav(sourceBlob = this.getSourceBlob()) {
        const buffer = await sourceBlob.arrayBuffer();

        const decodeCtx = new (window.AudioContext || window.webkitAudioContext)();
        let decodedBuffer;
        try {
          decodedBuffer = await decodeCtx.decodeAudioData(buffer.slice(0));
        } finally {
          await decodeCtx.close();
        }

        const wavArrayBuffer = VoiceAgent.encodeWav(decodedBuffer);
        return new Blob([wavArrayBuffer], { type: "audio/wav" });
      }

      setupAnalyser(stream) {
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = this.audioCtx.createMediaStreamSource(stream);
        this.analyser = this.audioCtx.createAnalyser();
        this.analyser.fftSize = 1024;
        source.connect(this.analyser);
        this.analyserData = new Uint8Array(this.analyser.frequencyBinCount);

        const tick = () => {
          if (!this.analyser) return;
          this.analyser.getByteTimeDomainData(this.analyserData);

          let sumSquares = 0;
          for (let i = 0; i < this.analyserData.length; i += 1) {
            const centered = (this.analyserData[i] - 128) / 128;
            sumSquares += centered * centered;
          }
          const rms = Math.sqrt(sumSquares / this.analyserData.length);
          const scaled = Math.min(1, rms * 2.8);
          this.onLevel(scaled);
          this.levelRaf = requestAnimationFrame(tick);
        };

        tick();
      }

      stopAllTracks() {
        if (this.stream) {
          this.stream.getTracks().forEach((track) => track.stop());
        }
        this.stream = null;
      }

      stopAnalyserLoop() {
        if (this.levelRaf) cancelAnimationFrame(this.levelRaf);
        this.levelRaf = null;
        this.onLevel(0);
        if (this.audioCtx) {
          this.audioCtx.close().catch(() => {});
        }
        this.audioCtx = null;
        this.analyser = null;
      }

      runDurationLoop() {
        const step = () => {
          const seconds = (performance.now() - this.recordingStartedAt) / 1000;
          this.emitMetrics({ durationSeconds: seconds, wavBytes: 0 });
          this.durationRaf = requestAnimationFrame(step);
        };
        this.durationRaf = requestAnimationFrame(step);
      }

      stopDurationLoop() {
        if (this.durationRaf) cancelAnimationFrame(this.durationRaf);
        this.durationRaf = null;
      }

      emitMetrics(metrics) {
        this._lastMetrics = metrics;
        this.onMetricsHandler(metrics);
      }

      getUploadFilename(mimeType) {
        if (mimeType.includes("webm")) return "voice-capture.webm";
        if (mimeType.includes("ogg")) return "voice-capture.ogg";
        if (mimeType.includes("mp4")) return "voice-capture.mp4";
        if (mimeType.includes("wav")) return "voice-capture.wav";
        return "voice-capture.audio";
      }

      formatBlobSize(bytes) {
        const kb = bytes / 1024;
        if (kb < 1024) return kb.toFixed(1) + " KB";
        return (kb / 1024).toFixed(2) + " MB";
      }

      static chooseRecorderMimeType() {
        const options = [
          "audio/webm;codecs=opus",
          "audio/webm",
          "audio/ogg;codecs=opus",
          "audio/mp4"
        ];

        for (const type of options) {
          if (MediaRecorder.isTypeSupported(type)) return type;
        }
        return "";
      }

      static encodeWav(audioBuffer) {
        const channelCount = audioBuffer.numberOfChannels;
        const sampleRate = audioBuffer.sampleRate;
        const bitsPerSample = 16;

        const channelData = [];
        for (let channel = 0; channel < channelCount; channel += 1) {
          channelData.push(audioBuffer.getChannelData(channel));
        }

        const sampleCount = audioBuffer.length;
        const blockAlign = channelCount * (bitsPerSample / 8);
        const byteRate = sampleRate * blockAlign;
        const dataSize = sampleCount * blockAlign;
        const buffer = new ArrayBuffer(44 + dataSize);
        const view = new DataView(buffer);

        VoiceAgent.writeString(view, 0, "RIFF");
        view.setUint32(4, 36 + dataSize, true);
        VoiceAgent.writeString(view, 8, "WAVE");
        VoiceAgent.writeString(view, 12, "fmt ");
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, channelCount, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, byteRate, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, bitsPerSample, true);
        VoiceAgent.writeString(view, 36, "data");
        view.setUint32(40, dataSize, true);

        let offset = 44;
        for (let i = 0; i < sampleCount; i += 1) {
          for (let channel = 0; channel < channelCount; channel += 1) {
            const sample = Math.max(-1, Math.min(1, channelData[channel][i]));
            const intSample = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
            view.setInt16(offset, intSample, true);
            offset += 2;
          }
        }

        return buffer;
      }

      static writeString(view, offset, value) {
        for (let i = 0; i < value.length; i += 1) {
          view.setUint8(offset + i, value.charCodeAt(i));
        }
      }
    }

    const el = {
      statePill: document.getElementById("state-pill"),
      statusLine: document.getElementById("status-line"),
      meterFill: document.getElementById("meter-fill"),
      duration: document.getElementById("duration"),
      blobSize: document.getElementById("blob-size"),
      transcript: document.getElementById("transcript"),
      apiKey: document.getElementById("api-key"),
      backend: document.getElementById("backend"),
      localEndpoint: document.getElementById("local-endpoint"),
      localModel: document.getElementById("local-model"),
      language: document.getElementById("language"),
      prompt: document.getElementById("prompt"),
      start: document.getElementById("btn-start"),
      stop: document.getElementById("btn-stop"),
      transcribe: document.getElementById("btn-transcribe"),
      interrupt: document.getElementById("btn-interrupt"),
      reset: document.getElementById("btn-reset"),
      download: document.getElementById("btn-download")
    };

    let downloadUrl = null;
    let transcribeProgressTimer = null;

    const stateLabel = {
      idle: "Idle",
      listening: "Listening",
      stopping: "Stopping",
      recorded: "Recorded",
      transcribing: "Transcribing",
      done: "Done",
      interrupted: "Interrupted",
      error: "Error"
    };

    function formatBytes(bytes) {
      if (!bytes) return "-";
      const kb = bytes / 1024;
      if (kb < 1024) return kb.toFixed(1) + " KB";
      return (kb / 1024).toFixed(2) + " MB";
    }

    function setStatus(message, isError = false, variant = "") {
      el.statusLine.textContent = message;
      el.statusLine.classList.remove("error", "ok");
      if (isError) el.statusLine.classList.add("error");
      if (!isError && variant === "ok") el.statusLine.classList.add("ok");
    }

    function setButtons(state) {
      const hasWav = Boolean(agent.lastWavBlob);
      const isListening = state === "listening";
      const isTranscribing = state === "transcribing";

      el.start.disabled = isListening || isTranscribing;
      el.stop.disabled = !isListening;
      el.transcribe.disabled = !hasWav || isListening || isTranscribing;
      el.interrupt.disabled = !isTranscribing;
      el.download.disabled = !hasWav;
    }

    function setLevel(level) {
      const clamped = Math.max(0, Math.min(1, level));
      document.documentElement.style.setProperty("--orb-level", clamped.toFixed(3));
      el.meterFill.style.width = (clamped * 100).toFixed(1) + "%";
    }

    function setMetrics({ durationSeconds, wavBytes }) {
      el.duration.textContent = "Duration: " + durationSeconds.toFixed(1) + "s";
      if (wavBytes > 0) {
        el.blobSize.textContent = "WAV: " + formatBytes(wavBytes);
      }
    }

    const agent = new VoiceAgent({
      onStateChange: (state) => {
        el.statePill.textContent = stateLabel[state] || state;
        setButtons(state);
      },
      onLevel: setLevel,
      onStatus: setStatus,
      onMetrics: setMetrics
    });

    function refreshDownloadUrl() {
      if (downloadUrl) {
        URL.revokeObjectURL(downloadUrl);
        downloadUrl = null;
      }
      if (agent.lastWavBlob) {
        downloadUrl = URL.createObjectURL(agent.lastWavBlob);
      }
      setButtons(agent.state);
      setMetrics({ durationSeconds: agent.getDurationSeconds(), wavBytes: agent.lastWavBlob ? agent.lastWavBlob.size : 0 });
    }

    el.start.addEventListener("click", async () => {
      try {
        await agent.start();
        el.transcript.value = "";
      } catch {
        // Status message already handled in class.
      }
    });

    el.stop.addEventListener("click", async () => {
      try {
        await agent.stop();
        refreshDownloadUrl();
      } catch {
        // Status message already handled in class.
      }
    });

    el.transcribe.addEventListener("click", async () => {
      const backend = el.backend ? el.backend.value : "openai";
      setStatus(backend === "local" ? "Preparing local Whisper request..." : "Preparing Whisper-1 request...");
      const startedAt = performance.now();
      if (transcribeProgressTimer) clearInterval(transcribeProgressTimer);

      transcribeProgressTimer = setInterval(() => {
        if (agent.state !== "transcribing") return;
        const elapsed = ((performance.now() - startedAt) / 1000).toFixed(1);
        setStatus((backend === "local" ? "Transcribing with local Whisper... " : "Transcribing with Whisper-1... ") + elapsed + "s elapsed");
      }, 350);

      try {
        const text = await agent.transcribe({
          apiKey: el.apiKey.value.trim(),
          language: el.language.value.trim(),
          prompt: el.prompt.value.trim(),
          temperature: 0,
          useCompressedUpload: true,
          backend,
          localEndpoint: el.localEndpoint.value.trim(),
          localModel: el.localModel.value.trim()
        });

        if (text) {
          el.transcript.value = text;
        }
      } catch {
        // Status message already handled in class.
      } finally {
        if (transcribeProgressTimer) {
          clearInterval(transcribeProgressTimer);
          transcribeProgressTimer = null;
        }
        setButtons(agent.state);
      }
    });
    // Backend selector logic
    const apiKeyField = document.getElementById("api-key-field");
    const localEndpointField = document.getElementById("local-endpoint-field");
    const localModelField = document.getElementById("local-model-field");
    el.backend.addEventListener("change", () => {
      if (el.backend.value === "local") {
        apiKeyField.style.display = "none";
        localEndpointField.style.display = "";
        localModelField.style.display = "";
      } else {
        apiKeyField.style.display = "";
        localEndpointField.style.display = "none";
        localModelField.style.display = "none";
      }
    });
    // Hide API key if local backend is default
    if (el.backend.value === "local") {
      apiKeyField.style.display = "none";
      localEndpointField.style.display = "";
      localModelField.style.display = "";
    }

    el.interrupt.addEventListener("click", () => {
      if (!agent.interrupt()) {
        setStatus("Interrupt is available only while transcribing.");
      }
    });

    el.download.addEventListener("click", () => {
      if (!downloadUrl) return;
      const anchor = document.createElement("a");
      anchor.href = downloadUrl;
      anchor.download = "voice-capture.wav";
      anchor.click();
      setStatus("WAV download started.", false, "ok");
    });

    el.reset.addEventListener("click", () => {
      agent.reset();
      el.transcript.value = "";
      refreshDownloadUrl();
      setStatus("Ready.");
    });

    window.addEventListener("beforeunload", () => {
      if (downloadUrl) URL.revokeObjectURL(downloadUrl);
      agent.reset();
    });

    document.getElementById("agent-model").textContent = "Agent Runtime: " + AGENT_MODEL;
    setButtons("idle");
    setLevel(0);
  </script>
</body>
</html>
